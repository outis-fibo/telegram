name: Financial Brief Bot

on:
  schedule:
    # Günde 3 defa çalıştır: UTC saatiyle 06:00, 12:00 ve 18:00
    # (Türkiye saati ile yaklaşık 09:00, 15:00 ve 21:00'e denk gelir)
    - cron: '0 9,15,21 * * *' 
  workflow_dispatch: # İstediğin zaman GitHub üzerinden manuel tetikleme butonu

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          # GitHub Secrets'tan alınacak API anahtarları
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
