name: Financial Brief Bot

on:
  schedule:
    - cron: '0 11 * * *'   # TR 09:00
    - cron: '0 15 * * *'  # TR 15:00
    - cron: '0 22 * * *'  # TR 22:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: python main.py

      - name: Hafızayı kaydet
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add weekly_memory.json telegram_offset.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: hafıza güncellendi [skip ci]"
          git push || true
